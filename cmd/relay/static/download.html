<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AIRPIPE / DOWNLOAD</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'JetBrains Mono',monospace;
  background:#000;color:#fff;
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px;
  background-image:radial-gradient(rgba(255,255,255,0.04) 1px,transparent 1px);
  background-size:20px 20px;
}
a{color:#00d4ff;text-decoration:none}
a:hover{text-decoration:underline}

.container{max-width:480px;width:100%;text-align:center;display:flex;flex-direction:column;align-items:center;gap:24px}
.logo{font-size:1.5rem;font-weight:700;letter-spacing:4px;text-transform:uppercase}
.logo span{color:#00d4ff}
.logo a{color:inherit;text-decoration:none}
.logo a:hover span{text-decoration:underline}

.card{
  width:100%;background:#000;
  border:1px dotted #333;padding:24px;
}

.status{font-size:0.8rem;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.filename{font-size:0.75rem;color:#ccc;background:#0a0a0a;border:1px dotted #222;padding:8px 12px;word-break:break-all;margin:8px 0}
.size-info{font-size:0.7rem;color:#555;font-variant-numeric:tabular-nums;margin-bottom:8px}

.progress-wrap{width:100%;margin:8px 0}
.progress-bar{background:#111;border:1px dotted #333;height:6px;overflow:hidden}
.progress-fill{height:100%;background:#00d4ff;width:0%;transition:width 0.15s}
.progress-text{font-size:0.7rem;color:#555;margin-top:6px;font-variant-numeric:tabular-nums}

.checkmark{font-size:2rem;color:#00d4ff;margin-bottom:8px;line-height:1}

.hidden{display:none}

.badge{
  display:inline-flex;align-items:center;gap:6px;
  border:1px dotted #333;color:#555;
  padding:6px 12px;font-size:0.6rem;
  text-transform:uppercase;letter-spacing:1px;
}
.badge svg{width:10px;height:10px;fill:currentColor}

.footer{font-size:0.6rem;color:#333;text-transform:uppercase;letter-spacing:1px}
.footer a{color:#444}
.footer a:hover{color:#00d4ff}
</style>
</head>
<body>
<div class="container">

  <div class="logo"><a href="/">AIR<span>PIPE</span></a> / DOWNLOAD</div>

  <div class="card">

    <div id="loading">
      <div class="status" id="load-status">downloading...</div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <div class="progress-text" id="ptext"></div>
      </div>
    </div>

    <div id="complete" class="hidden">
      <div class="checkmark">&check;</div>
      <div class="status" style="color:#00d4ff">decrypted</div>
      <div class="filename" id="fname">-</div>
      <div class="size-info" id="file-size"></div>
    </div>

    <div id="error" class="hidden">
      <div class="status" style="color:#00d4ff">error</div>
      <div class="filename" id="errmsg">-</div>
    </div>

  </div>

  <div class="badge">
    <svg viewBox="0 0 16 16"><path d="M8 1a4 4 0 0 0-4 4v3H3a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V9a1 1 0 0 0-1-1h-1V5a4 4 0 0 0-4-4zm2 7H6V5a2 2 0 1 1 4 0v3z"/></svg>
    end-to-end encrypted
  </div>

  <div class="footer">built by <a href="https://sanyamgarg.com" target="_blank">sanyam garg</a></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tweetnacl/1.0.3/nacl-fast.min.js"></script>
<script>
const token=location.pathname.split('/').pop();
const keyStr=location.hash.slice(1);
if(!token||!keyStr){showError('Invalid link');throw''}

let key;
try{
  key=b64decode(keyStr);
  if(key.length!==32)throw'';
}catch(e){showError('Invalid encryption key');throw e}

function formatSize(bytes){
  if(bytes===0)return '0 B';
  const units=['B','KB','MB','GB'];
  const i=Math.floor(Math.log(bytes)/Math.log(1024));
  return (bytes/Math.pow(1024,i)).toFixed(i===0?0:1)+' '+units[i];
}

(async()=>{
  try{
    setStatus('downloading...');

    const resp=await fetch('/raw/'+token);
    if(!resp.ok){showError('File not found or expired');return}

    const contentLength=resp.headers.get('content-length');
    const totalSize=contentLength?parseInt(contentLength):null;

    let encrypted;
    if(totalSize && resp.body){
      const reader=resp.body.getReader();
      const chunks=[];
      let received=0;
      while(true){
        const {done,value}=await reader.read();
        if(done)break;
        chunks.push(value);
        received+=value.length;
        const pct=Math.round(received/totalSize*100);
        document.getElementById('progress').style.width=pct+'%';
        document.getElementById('ptext').textContent=formatSize(received)+' / '+formatSize(totalSize);
      }
      encrypted=new Uint8Array(received);
      let pos=0;
      for(const chunk of chunks){encrypted.set(chunk,pos);pos+=chunk.length}
    }else{
      document.getElementById('progress').style.width='50%';
      encrypted=new Uint8Array(await resp.arrayBuffer());
    }

    if(encrypted.length<24){showError('File too small to contain encrypted data');return}

    setStatus('decrypting...');
    document.getElementById('progress').style.width='80%';

    const nonce=encrypted.slice(0,24);
    const ciphertext=encrypted.slice(24);

    let decrypted;
    try{
      decrypted=nacl.secretbox.open(ciphertext,nonce,key);
    }catch(e){
      showError('Decryption error: '+(e.message||'corrupted data'));
      return;
    }
    if(!decrypted){showError('Decryption failed. Wrong key or corrupted file.');return}

    document.getElementById('progress').style.width='100%';

    const fnLen=(decrypted[0]<<24)|(decrypted[1]<<16)|(decrypted[2]<<8)|decrypted[3];
    const filename=new TextDecoder().decode(decrypted.slice(4,4+fnLen));
    const content=decrypted.slice(4+fnLen);

    document.getElementById('fname').textContent=filename;
    document.getElementById('file-size').textContent=formatSize(content.length);
    show('complete');

    const blob=new Blob([content]);
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=filename;
    a.click();
  }catch(e){
    showError(e.message||'Download failed');
  }
})();

function setStatus(text){
  document.getElementById('load-status').textContent=text;
}

function show(id){
  ['loading','complete','error'].forEach(x=>document.getElementById(x).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function showError(msg){
  show('error');
  document.getElementById('errmsg').textContent=msg;
}

function b64decode(s){
  s=s.replace(/-/g,'+').replace(/_/g,'/');
  while(s.length%4)s+='=';
  const b=atob(s);
  const r=new Uint8Array(b.length);
  for(let i=0;i<b.length;i++)r[i]=b.charCodeAt(i);
  return r;
}
</script>
</body>
</html>
