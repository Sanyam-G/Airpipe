<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AIRPIPE / UPLOAD</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'JetBrains Mono',monospace;
  background:#000;color:#fff;
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px;
  background-image:radial-gradient(rgba(255,255,255,0.04) 1px,transparent 1px);
  background-size:20px 20px;
}
a{color:#00d4ff;text-decoration:none}
a:hover{text-decoration:underline}

.container{max-width:480px;width:100%;text-align:center;display:flex;flex-direction:column;align-items:center;gap:24px}
.logo{font-size:1.5rem;font-weight:700;letter-spacing:4px;text-transform:uppercase}
.logo span{color:#00d4ff}
.logo a{color:inherit;text-decoration:none}
.logo a:hover span{text-decoration:underline}

.card{
  width:100%;background:#000;
  border:1px dotted #333;padding:24px;
}

.status{font-size:0.8rem;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.status-detail{font-size:0.65rem;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}

/* Drop zone */
.drop-zone{
  border:2px dotted #333;padding:48px 24px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  transition:border-color 0.15s,background 0.15s;
  min-height:180px;justify-content:center;
}
.drop-zone:hover,.drop-zone.dragover{border-color:#00d4ff;background:rgba(255,77,0,0.03)}
.drop-icon{font-size:0.8rem;color:#555;text-transform:uppercase;letter-spacing:2px}
.drop-label{font-size:0.85rem;color:#888}
.drop-label strong{color:#00d4ff;cursor:pointer}
.drop-hint{font-size:0.6rem;color:#444;text-transform:uppercase;letter-spacing:1px}
input[type=file]{display:none}

.filename{font-size:0.75rem;color:#ccc;background:#0a0a0a;border:1px dotted #222;padding:8px 12px;word-break:break-all;margin:8px 0}
.size-info{font-size:0.7rem;color:#555;font-variant-numeric:tabular-nums;margin-bottom:8px}

.progress-wrap{width:100%;margin:8px 0}
.progress-bar{background:#111;border:1px dotted #333;height:6px;overflow:hidden}
.progress-fill{height:100%;background:#00d4ff;width:0%;transition:width 0.15s}
.progress-text{font-size:0.7rem;color:#555;margin-top:6px;font-variant-numeric:tabular-nums}
.speed-info{font-size:0.65rem;color:#444;margin-top:4px;font-variant-numeric:tabular-nums}

.checkmark{font-size:2rem;color:#00d4ff;margin-bottom:8px;line-height:1}

.hidden{display:none}

/* Connecting dots */
@keyframes blink{0%,100%{opacity:0.2}50%{opacity:1}}
.dots{display:flex;gap:6px;justify-content:center;margin:12px 0}
.dots span{width:4px;height:4px;background:#00d4ff;animation:blink 1.4s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:0.2s}
.dots span:nth-child(3){animation-delay:0.4s}

.badge{
  display:inline-flex;align-items:center;gap:6px;
  border:1px dotted #333;color:#555;
  padding:6px 12px;font-size:0.6rem;
  text-transform:uppercase;letter-spacing:1px;
}
.badge svg{width:10px;height:10px;fill:currentColor}

.footer{font-size:0.6rem;color:#333;text-transform:uppercase;letter-spacing:1px}
.footer a{color:#444}
.footer a:hover{color:#00d4ff}

@media(max-width:540px){
  .drop-zone{padding:32px 16px;min-height:140px}
}
</style>
</head>
<body>
<div class="container">

  <div class="logo"><a href="/">AIR<span>PIPE</span></a> / UPLOAD</div>

  <div class="card">

    <div id="connecting">
      <div class="status">connecting...</div>
      <div class="status-detail">establishing encrypted channel</div>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>

    <div id="select" class="hidden">
      <div class="status">ready</div>
      <div class="status-detail">file will be encrypted before transfer</div>
      <div class="drop-zone" id="dropzone">
        <div class="drop-icon">+</div>
        <div class="drop-label">tap to select or <strong>drop a file</strong></div>
        <div class="drop-hint">any file type, any size</div>
      </div>
      <input type="file" id="fileinput">
    </div>

    <div id="sending" class="hidden">
      <div class="status">uploading</div>
      <div class="filename" id="filename">-</div>
      <div class="size-info" id="send-size"></div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <div class="progress-text" id="ptext">0%</div>
      </div>
      <div class="speed-info" id="speed"></div>
    </div>

    <div id="complete" class="hidden">
      <div class="checkmark">&check;</div>
      <div class="status" style="color:#00d4ff">transfer complete</div>
      <div class="filename" id="done-name">-</div>
      <div class="size-info" id="done-size"></div>
    </div>

    <div id="error" class="hidden">
      <div class="status" style="color:#00d4ff">error</div>
      <div class="filename" id="errmsg">-</div>
    </div>

  </div>

  <div class="badge">
    <svg viewBox="0 0 16 16"><path d="M8 1a4 4 0 0 0-4 4v3H3a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V9a1 1 0 0 0-1-1h-1V5a4 4 0 0 0-4-4zm2 7H6V5a2 2 0 1 1 4 0v3z"/></svg>
    end-to-end encrypted
  </div>

  <div class="footer">built by <a href="https://sanyamgarg.com" target="_blank">sanyam garg</a></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tweetnacl/1.0.3/nacl-fast.min.js"></script>
<script>
const CHUNK=64*1024;
const token=location.pathname.split('/').pop();
const keyHash=location.hash.slice(1);
if(!token||!keyHash){showError('Invalid link');throw''}

let keyBytes;
try{
  keyBytes=b64decode(keyHash);
  if(keyBytes.length!==32)throw'';
}catch(e){showError('Invalid encryption key');throw e}

function formatSize(bytes){
  if(bytes===0)return '0 B';
  const units=['B','KB','MB','GB'];
  const i=Math.floor(Math.log(bytes)/Math.log(1024));
  return (bytes/Math.pow(1024,i)).toFixed(i===0?0:1)+' '+units[i];
}

function formatSpeed(bytesPerSec){
  if(bytesPerSec<1024)return bytesPerSec.toFixed(0)+' B/s';
  if(bytesPerSec<1048576)return (bytesPerSec/1024).toFixed(1)+' KB/s';
  return (bytesPerSec/1048576).toFixed(1)+' MB/s';
}

// WebSocket setup
const ws=new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+location.host+'/ws/'+token);
ws.binaryType='arraybuffer';
ws.onopen=()=>{show('select')};
ws.onerror=()=>{showError('Connection lost. Reload to retry.')};
ws.onclose=()=>{
  const sendingEl=document.getElementById('sending');
  if(!sendingEl.classList.contains('hidden')){
    showError('Connection closed during transfer');
  }
};

// Click to select
const dropzone=document.getElementById('dropzone');
const fileinput=document.getElementById('fileinput');
dropzone.addEventListener('click',()=>fileinput.click());
fileinput.addEventListener('change',(e)=>{if(e.target.files.length)sendFile(e.target.files[0])});

// Drag and drop
dropzone.addEventListener('dragover',(e)=>{e.preventDefault();dropzone.classList.add('dragover')});
dropzone.addEventListener('dragleave',()=>{dropzone.classList.remove('dragover')});
dropzone.addEventListener('drop',(e)=>{
  e.preventDefault();
  dropzone.classList.remove('dragover');
  if(e.dataTransfer.files.length)sendFile(e.dataTransfer.files[0]);
});

async function sendFile(file){
  document.getElementById('filename').textContent=file.name;
  document.getElementById('send-size').textContent=formatSize(file.size);
  show('sending');

  // Send protocol version handshake (0x20 = MsgTypeVersion, payload = [1])
  ws.send(encrypt(encode(0x20,new Uint8Array([1])),keyBytes));

  const meta={filename:file.name,size:file.size,chunks:Math.ceil(file.size/CHUNK)};
  ws.send(encrypt(encode(0x01,new TextEncoder().encode(JSON.stringify(meta))),keyBytes));

  let offset=0;
  const startTime=performance.now();
  let lastUIUpdate=0;

  while(offset<file.size){
    const end=Math.min(offset+CHUNK,file.size);
    const chunk=await file.slice(offset,end).arrayBuffer();
    ws.send(encrypt(encode(0x10,new Uint8Array(chunk)),keyBytes));
    offset=end;

    const now=performance.now();
    if(now-lastUIUpdate>50||offset>=file.size){
      lastUIUpdate=now;
      const pct=Math.round(offset/file.size*100);
      const elapsed=(now-startTime)/1000;
      const speed=elapsed>0?offset/elapsed:0;

      await new Promise(resolve=>{
        requestAnimationFrame(()=>{
          document.getElementById('progress').style.width=pct+'%';
          document.getElementById('ptext').textContent=pct+'% \u00b7 '+formatSize(offset)+' / '+formatSize(file.size);
          document.getElementById('speed').textContent=formatSpeed(speed);
          resolve();
        });
      });
    }
  }

  ws.send(encrypt(encode(0x03,new Uint8Array(0)),keyBytes));

  document.getElementById('done-name').textContent=file.name;
  document.getElementById('done-size').textContent=formatSize(file.size);
  show('complete');
}

function show(id){
  ['connecting','select','sending','complete','error'].forEach(x=>document.getElementById(x).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function showError(msg){
  show('error');
  document.getElementById('errmsg').textContent=msg;
}

function encrypt(data,key){
  const nonce=nacl.randomBytes(24);
  const enc=nacl.secretbox(data,nonce,key);
  const r=new Uint8Array(24+enc.length);
  r.set(nonce);
  r.set(enc,24);
  return r;
}

function encode(type,payload){
  const r=new Uint8Array(5+payload.length);
  r[0]=type;
  r[1]=(payload.length>>24)&0xff;
  r[2]=(payload.length>>16)&0xff;
  r[3]=(payload.length>>8)&0xff;
  r[4]=payload.length&0xff;
  r.set(payload,5);
  return r;
}

function b64decode(s){
  s=s.replace(/-/g,'+').replace(/_/g,'/');
  while(s.length%4)s+='=';
  const b=atob(s);
  const r=new Uint8Array(b.length);
  for(let i=0;i<b.length;i++)r[i]=b.charCodeAt(i);
  return r;
}
</script>
</body>
</html>
